<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 text-white min-h-screen">

<div class="p-6">

    <!-- NAV -->
    <nav class="bg-gray-900 p-4 rounded-xl flex justify-between items-center mb-6">

        <div class="flex gap-4">
            <a href="{{url_for('viewallnotes')}}" class="bg-gray-700 px-4 py-2 rounded">View Notes</a>
        </div>

        <div class="flex gap-4 items-center">
            {{session.get('user')}}

            <a href="{{url_for('logout')}}" class="bg-red-500 px-4 py-2 rounded">Logout</a>
        </div>

    </nav>

    <!-- ADD NOTES -->
    <div class="bg-gray-900 p-6 rounded-xl mb-6">
        <h2 class="text-xl mb-4">Add Note</h2>

        <form action="{{url_for('addnotes')}}" method="POST">
            <input type="text" name="note-title" placeholder="Title" required
                class="w-full p-2 mb-3 bg-gray-700 rounded">

            <textarea name="note-description" placeholder="Description" required
                class="w-full p-2 mb-3 bg-gray-700 rounded"></textarea>

            <button class="bg-teal-500 px-4 py-2 rounded">Add</button>
        </form>
    </div>

    <!-- VIEW NOTES -->
    {% if all_notesdata %}
    <div class="bg-gray-900 p-6 rounded-xl">
        <h2 class="text-xl mb-4">All Notes</h2>

        <table class="w-full">
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Date</th>
            </tr>

            {% for i in all_notesdata %}
            <tr>
                <td>{{i[0]}}</td>
                <td>{{i[1]}}</td>
                <td>{{i[3]}}</td>
            </tr>
            {% endfor %}

        </table>
    </div>
    {% endif %}

</div>

</body>
</html>
