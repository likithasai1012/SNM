<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-900 flex items-center justify-center min-h-screen p-4">

<div class="bg-gray-800 rounded-3xl p-8 md:p-12 shadow-2xl max-w-md w-full">

    <h2 class="text-3xl font-bold text-center text-white mb-6">
        Create an Account
    </h2>

    <!-- ✅ FLASH MESSAGE ADD -->
    {% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for msg in messages %}
            <div class="bg-red-500 text-white p-2 rounded mb-4 text-center">
                {{msg}}
            </div>
        {% endfor %}
    {% endif %}
    {% endwith %}

    <!-- ✅ FORM ACTION FIX -->
    <form action="{{url_for('userregister')}}" method="POST">

        <div class="mb-6">
            <label class="block text-gray-400 text-sm mb-2">Username</label>
            <input type="text" name="username" required
                   class="w-full px-4 py-3 bg-gray-700 text-white rounded-xl">
        </div>

        <div class="mb-6">
            <label class="block text-gray-400 text-sm mb-2">Email</label>
            <input type="email" name="email" required
                   class="w-full px-4 py-3 bg-gray-700 text-white rounded-xl">
        </div>

        <div class="mb-6">
            <label class="block text-gray-400 text-sm mb-2">Password</label>
            <input type="password" name="password" required
                   class="w-full px-4 py-3 bg-gray-700 text-white rounded-xl">
        </div>

        <button class="w-full bg-teal-500 py-3 rounded-xl hover:bg-teal-600">
            Register
        </button>
    </form>

    <div class="mt-6 text-center">
        <a href="{{url_for('home')}}" class="text-gray-400 hover:text-teal-500 text-sm">
            ← Back to Home
        </a>
    </div>

</div>

</body>
</html>
